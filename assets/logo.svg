<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="cc-bot logo">
  <title>cc-bot</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5b29"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
  </defs>
  <!-- chat bubble silhouette -->
  <path d="M10 12 H54 A6 6 0 0 1 60 18 V40 A6 6 0 0 1 54 46 H32 L20 56 V46 H10 A6 6 0 0 1 4 40 V18 A6 6 0 0 1 10 12 Z"
    fill="#0a0a0a" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- two terminal carets, evoking "cc" -->
  <path d="M16 24 L22 30 L16 36" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 24 L34 30 L28 36" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor block -->
  <rect x="40" y="26" width="10" height="10" rx="1.5" fill="url(#g)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
